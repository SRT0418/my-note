<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダー</title>
    <link rel="stylesheet" href="./css/common.css">
    <script src="./js/auth.js"></script>
</head>

<body>

    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="nav-menu" class="nav-menu">
        <div class="nav-menu-header">
            <span>メニュー</span>
            <button id="drawer-close-btn" aria-label="閉じる">&times;</button>
        </div>
        <a href="index.html">HOME</a>
        <a href="kadai.html">課題締切管理</a>
        <a href="tasks.html">タスク管理</a>
        <a href="everydayTask.html">毎日習慣タスク</a>
        <a href="wishlist.html">やりたいことリスト</a>
        <a href="ideas.html">アイデア保存</a>
        <a href="calendar.html">カレンダー</a>
    </div>

    <div class="side-trigger">
        <button id="drawer-btn" aria-label="メニューを開く">☰</button>
    </div>

    <h1>カレンダー</h1>

    <h1 id="today-date"></h1>

    <button id="add-button">予定を追加</button>

    <div class="calendar-nav">
        <button id="prev-month-btn" aria-label="前の月">&lt;</button>
        <h2 id="calendar-month-label"></h2>
        <button id="next-month-btn" aria-label="次の月">&gt;</button>
    </div>

    <div id="calendar-grid" class="calendar-grid"></div>

    <div class="calendar-list-header">
        <h2 id="event-list-heading">すべての予定</h2>
        <button id="show-all-btn" class="show-all-btn" style="display:none;">すべて表示</button>
    </div>

    <div id="event-list"></div>

    <h2>過去の予定（履歴）</h2>
    <div id="history-list"></div>

    <h2>削除済みの予定</h2>
    <div id="deleted-schedule-list"></div>

    <script src="./js/common.js" defer></script>
    <script src="./js/calendar.js" defer></script>
</body>

</html>
