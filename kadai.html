<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="./css/common.css">
</head>

<body>
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="nav-menu" class="nav-menu">
        <div class="nav-menu-header">
            <span>メニュー</span>
            <button id="drawer-close-btn" aria-label="閉じる">&times;</button>
        </div>
        <a href="index.html">HOME</a>
        <a href="tasks.html">タスク管理</a>
        <a href="everydayTask.html">毎日習慣タスク</a>
        <a href="wishlist.html">やりたいことリスト</a>
        <a href="ideas.html">アイデア保存</a>
    </div>

    <div class="side-trigger">
        <button id="drawer-btn" aria-label="メニューを開く">☰</button>
    </div>

    <header>
        <h1>課題締切管理</h1>
    </header>

    <h1 id="today-date"></h1>

    <h3>未達成課題：<span id="unfinished-count">0</span>件</h3>
    <h3>達成済み課題：<span id="completed-count">0</span>件</h3>
    <h3>期限切れ課題：<span id="overdue-count">0</span>件</h3>

    <button id="add-button">追加</button>
    <button onclick="location.href='result.html'">これまでの達成率を見る</button>

    <h2>未達成課題</h2>

    <h3>今週締切</h3>
    <div id="unfinished-this-week" class="card">

    </div>

    <h3>来週締切</h3>
    <div id="unfinished-next-week" class="card">

    </div>

    <h3>再来週以降</h3>
    <div id="unfinished-later" class="card">

    </div>

    <h2>達成済み課題</h2>
    <div id="completed-list" class="card">

    </div>

    <h2>削除済み課題</h2>
    <div id="deleted-list" class="card">

    </div>

    <script src="./js/common.js" defer></script>
    <script src="./js/kadai.js" defer></script>
</body>

</html>
