<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク追加</title>
    <link rel="stylesheet" href="./css/common.css">
    <script src="./js/auth.js"></script>
</head>

<body class="add">

    <h1>タスク追加</h1>

    <div id="add-task-center">
        <label for="content">内容：</label><br>
        <input id="content" placeholder="内容"><br>

        <label for="priority">優先度：</label><br>
        <select id="priority">
            <option value="高">優先度：高</option>
            <option value="中" selected>優先度：中</option>
            <option value="低">優先度：低</option>
        </select><br>

        <label for="detail">詳細：</label><br>
        <textarea id="detail" rows="10" placeholder="詳細"></textarea><br>

        <br>
        <button id="save-button">保存</button>
        <button id="cancel-button">キャンセル</button>
    </div>

    <script src="./js/tasks-add.js"></script>

</body>

</html>
