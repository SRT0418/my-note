<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>習慣タスク達成結果</title>
    <link rel="stylesheet" href="./css/common.css">
</head>

<body>
    <nav class="topnav">
        <button id="hamburger-btn" aria-label="メニュー">☰</button>
        <div id="nav-menu" class="nav-menu">
            <a href="index.html">HOME</a>
            <a href="kadai.html">課題締切管理</a>
            <a href="tasks.html">タスク管理</a>
            <a href="everydayTask.html">毎日習慣タスク</a>
            <a href="wishlist.html">やりたいことリスト</a>
            <a href="ideas.html">アイデア保存</a>
        </div>
    </nav>

    <h1>習慣タスク 達成結果</h1>

    <!-- 今日の集計 -->
    <h2>今日の状況</h2>
    <h3>未達成：<span id="today-unfinished-count">0</span>件</h3>
    <h3>達成済み：<span id="today-completed-count">0</span>件</h3>

    <!-- 達成率バー -->
    <div class="rate-box">
        <div class="rate-label">達成率</div>
        <div id="rate-text">0%</div>
        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>
    </div>

    <!-- 円グラフ -->
    <canvas id="pieChart" width="300" height="300"></canvas>

    <div class="legend">
        <span><span class="color-box completed"></span> 達成</span>
        <span><span class="color-box unfinished"></span> 未達成</span>
    </div>

    <!-- 今日の未達成タスク一覧 -->
    <h2>未達成タスク一覧</h2>
    <div id="today-unfinished-list"></div>

    <!-- 今日の達成タスク一覧 -->
    <h2>達成タスク一覧</h2>
    <div id="today-completed-list"></div>

    <!-- 日ごとの達成履歴 -->
    <h2>日ごとの達成履歴</h2>
    <div id="daily-history-list"></div>

    <button onclick="location.href='everydayTask.html'">戻る</button>

    <script src="./js/common.js" defer></script>
    <script src="./js/edTaskResult.js"></script>
</body>

</html>
