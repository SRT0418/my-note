<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題追加</title>

    <link rel="stylesheet" href="./css/common.css">
    <script src="./js/auth.js"></script>
</head>

<body class="add">

    <h1>課題追加</h1>

    <div id="add-kadai-center">
        <label for="subject">科目名</label><br>
        <input id="subject" placeholder="科目名"><br>
        <label for="title">課題名</label><br>
        <input id="title" placeholder="課題名"><br>
        <label for="deadline">締め切り</label><br>
        <input id="deadline" type="datetime-local"><br>
        <label for="detail">詳細</label><br>
        <textarea id="detail" rows="10" placeholder="詳細"></textarea><br>

        <button id="save-button">保存</button>
        <button id="cancel-button">キャンセル</button>
    </div>

    <script src="./js/kadai-add.js"></script>

</body>

</html>
