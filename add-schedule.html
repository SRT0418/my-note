<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予定追加</title>
    <link rel="stylesheet" href="./css/common.css">
</head>

<body class="add">
    <h1 id="form-heading">予定追加</h1>

    <div id="add-schedule-center">
        <label for="title">予定</label><br>
        <input id="title" placeholder="例：勉強会"><br>

        <label for="partner">相手</label><br>
        <input id="partner" placeholder="例：彼女"><br>

        <label for="location">場所</label><br>
        <input type="text" id="location" placeholder="例: ○○カフェ、原宿"><br>

        <label>日時</label><br>

        <div class="schedule-datetime-row">
            <input id="start-date" type="date">
            <span>～</span>
            <input id="end-date" type="date">
        </div>
        <br>

        <div class="schedule-datetime-row">
            <input id="start-time" type="time">
            <span>～</span>
            <input id="end-time" type="time">
        </div>
        <br>

        <label for="description">詳細：</label><br>
        <textarea id="description" rows="4"></textarea>

        <br>
        <button id="save-button">保存</button>
        <button id="cancel-button">キャンセル</button>
    </div>

    <script src="./js/schedule-add.js"></script>
</body>

</html>
