<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyNote</title>
    <link rel="stylesheet" href="./css/common.css">
    <script src="./js/auth.js"></script>
</head>

<body>

    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="nav-menu" class="nav-menu">
        <div class="nav-menu-header">
            <span>メニュー</span>
            <button id="drawer-close-btn" aria-label="閉じる">&times;</button>
        </div>
        <a href="kadai.html">課題締切管理</a>
        <a href="tasks.html">タスク管理</a>
        <a href="everydayTask.html">毎日習慣タスク</a>
        <a href="wishlist.html">やりたいことリスト</a>
        <a href="ideas.html">アイデア保存</a>
        <a href="calendar.html">カレンダー</a>
    </div>

    <div class="side-trigger">
        <button id="drawer-btn" aria-label="メニューを開く">☰</button>
    </div>

    <header>
        <h1>MyNote</h1>
    </header>

    <h1 id="today-date"></h1>

    <div class="menu-grid">

        <div class="card menu-item" onclick="location.href='kadai.html'">
            <h2>課題締切管理</h2>
            <p>課題の締切を管理し、達成率を確認できます</p>
        </div>

        <div class="card menu-item" onclick="location.href='tasks.html'">
            <h2>タスク管理</h2>
            <p>締切のない用事を、優先度をつけて管理します</p>
        </div>

        <div class="card menu-item" onclick="location.href='everydayTask.html'">
            <h2>毎日習慣タスク</h2>
            <p>毎日続けたい習慣を登録し、達成状況を記録します</p>
        </div>

        <div class="card menu-item" onclick="location.href='wishlist.html'">
            <h2>やりたいことリスト</h2>
            <p>やりたいことをリストにして、達成チェックできます</p>
        </div>

        <div class="card menu-item" onclick="location.href='ideas.html'">
            <h2>アイデア保存</h2>
            <p>思いついたアイデアを保存しておけます</p>
        </div>

        <div class="card menu-item" onclick="location.href='calendar.html'">
            <h2>カレンダー</h2>
            <p>予定をカレンダーとカードで管理できます</p>
        </div>

    </div>

    <script src="./js/common.js" defer></script>

</body>

</html>
