<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日習慣タスク</title>
    <link rel="stylesheet" href="./css/common.css">
</head>

<body>
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="nav-menu" class="nav-menu">
        <div class="nav-menu-header">
            <span>メニュー</span>
            <button id="drawer-close-btn" aria-label="閉じる">&times;</button>
        </div>
        <a href="index.html">HOME</a>
        <a href="kadai.html">課題締切管理</a>
        <a href="tasks.html">タスク管理</a>
        <a href="wishlist.html">やりたいことリスト</a>
        <a href="ideas.html">アイデア保存</a>
        <a href="calendar.html">カレンダー</a>
    </div>

    <div class="side-trigger">
        <button id="drawer-btn" aria-label="メニューを開く">☰</button>
    </div>

    <h1>毎日習慣タスク</h1>

    <h1 id="today-date"></h1>

    <h3>未達成：<span id="unfinished-count">0</span>件</h3>
    <h3>達成済み：<span id="completed-count">0</span>件</h3>

    <button id="add-button">追加</button>
    <button onclick="location.href='edTaskResult.html'">達成履歴を見る</button>

    <h2>未達成タスク</h2>
    <div id="habit-unfinished-list" class="card"></div>

    <h2>達成済みタスク</h2>
    <div id="habit-completed-list" class="card"></div>

    <h2>削除済みタスク</h2>
    <div id="habit-deleted-list" class="card"></div>

    <script src="./js/common.js" defer></script>
    <script src="./js/everydayTask.js" defer></script>
</body>

</html>
