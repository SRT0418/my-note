<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>習慣タスク追加</title>
    <link rel="stylesheet" href="./css/common.css">
</head>

<body class="add">

    <h1>習慣タスク追加</h1>

    <label for="habit-title">タイトル</label><br>
    <input id="habit-title" placeholder="例：筋トレ、読書30分"><br>

    <label for="habit-detail">詳細</label><br>

    <button id="save-button">保存</button>
    <button id="cancel-button">キャンセル</button>

    <script src="./js/everydayTask-add.js"></script>

</body>
